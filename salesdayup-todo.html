  <style>
    body { background: #f5f6fa; color: #1a1d2e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .task-done label { text-decoration: line-through; color: #9ca3af; }
    .section-card { background: #fff; border: 1px solid #e2e6f0; border-radius: 12px; padding: 20px 24px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
    .section-title { font-size: 14px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 12px; }
    .tag { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
    .tag-done { background: #d1fae5; color: #065f46; }
    .tag-todo { background: #fef3c7; color: #92400e; }
    .tag-test { background: #ede9fe; color: #6d28d9; }
    .tag-p1 { background: #fee2e2; color: #991b1b; }
    .task-item { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; }
    .task-item input[type="checkbox"] { margin-top: 4px; width: 18px; height: 18px; accent-color: #6366f1; cursor: pointer; flex-shrink: 0; }
    .task-item label { cursor: pointer; font-size: 14px; line-height: 1.5; }
    .progress-bar { background: #e5e7eb; border-radius: 99px; height: 8px; overflow: hidden; margin-bottom: 8px; }
    .progress-fill { background: linear-gradient(90deg, #6366f1, #8b5cf6); height: 100%; border-radius: 99px; transition: width 0.3s; }
    .counter { font-size: 12px; color: #9ca3af; margin-bottom: 16px; }
    a.back { color: #6366f1; text-decoration: none; font-size: 13px; }
    a.back:hover { text-decoration: underline; }
  </style>
</head>

  <script>
    const STORAGE_KEY = 'salesdayup-todo-state';

    function loadState() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
    }

    function saveState(state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function updateProgress() {
      const all = document.querySelectorAll('input[data-key]');
      const checked = document.querySelectorAll('input[data-key]:checked');
      const done = document.querySelectorAll('#done-section input').length;
      const total = all.length + done;
      const completed = checked.length + done;
      const pct = Math.round((completed / total) * 100);
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('counter').textContent = completed + ' / ' + total + ' done (' + pct + '%)';
    }

    function init() {
      const state = loadState();
      const boxes = document.querySelectorAll('input[data-key]');
      boxes.forEach(box => {
        const key = box.dataset.key;
        if (state[key]) {
          box.checked = true;
          box.closest('.task-item').classList.add('task-done');
        }
        box.addEventListener('change', () => {
          const s = loadState();
          s[key] = box.checked;
          saveState(s);
          box.closest('.task-item').classList.toggle('task-done', box.checked);
          updateProgress();
        });
      });
      updateProgress();
    }

    init();
  </script>
